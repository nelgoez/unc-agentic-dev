name: Course Audit CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      course_id:
        description: 'Course ID to audit (default: 269)'
        required: false
        default: '269'

env:
  MOODLE_BASE_URL: ${{ secrets.MOODLE_BASE_URL }}
  TEST_COURSE_ID: ${{ inputs.course_id || '269' }}

jobs:
  ui-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Install Playwright (Chromium only)
        run: bunx playwright install chromium
      - name: Run UI audit (Playwright)
        env:
          STUDENT_USERNAME: ${{ secrets.STUDENT_USERNAME }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ALLURE_DIR: allure-results
        run: bunx playwright test tests/e2e/validate-course.kata.ts --timeout 180000
      - name: Upload UI audit results
        uses: actions/upload-artifact@v7
        with:
          name: ui-audit-results
          path: |
            reports/audit/
            allure-results/

  api-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run API audit (REST)
        env:
          MOODLE_WS_TOKEN: ${{ secrets.MOODLE_WS_TOKEN }}
        run: bun scripts/run-api-audit.ts
      - name: Upload API audit results
        uses: actions/upload-artifact@v7
        with:
          name: api-audit-results
          path: reports/audit/api-audit-results.json

  generate-report:
    needs: [ui-audit, api-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Download UI audit results
        uses: actions/download-artifact@v8
        with:
          name: ui-audit-results
          path: reports/audit

      - name: Download API audit results
        uses: actions/download-artifact@v8
        with:
          name: api-audit-results
          path: reports/audit

      - name: Generate unified audit report
        run: bun scripts/generate-audit-report.ts reports/audit/audit-results.json reports/audit audit-report --api-results reports/audit/api-audit-results.json

      - name: Generate Allure report
        run: bunx allure generate allure-results --clean -o allure-report --name "Campus Virtual - Curso ${{ env.TEST_COURSE_ID }}" --lang es

      - name: Upload unified report
        uses: actions/upload-artifact@v7
        with:
          name: audit-report
          path: audit-report/

      - name: Upload Allure report
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: allure-report/

  deploy-report:
    if: github.ref == 'refs/heads/master'
    needs: generate-report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download unified report
        uses: actions/download-artifact@v8
        with:
          name: audit-report
          path: _site

      - name: Download Allure report
        uses: actions/download-artifact@v8
        with:
          name: allure-report
          path: _site/allure

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
