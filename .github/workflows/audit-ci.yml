name: Course Audit CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      course_id:
        description: 'Course ID to audit (default: 269)'
        required: false
        default: '269'
      allure_url:
        description: 'Custom Allure base URL (optional)'
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: CI checks (types + lint + vars)
        run: bun run ci:check

      - name: Install Playwright (Chromium only)
        run: bunx playwright install chromium

      - name: Run course audit
        env:
          MOODLE_BASE_URL: ${{ secrets.MOODLE_BASE_URL }}
          STUDENT_USERNAME: ${{ secrets.STUDENT_USERNAME }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TEST_COURSE_ID: ${{ inputs.course_id || '269' }}
          ALLURE_DIR: allure-results
        run: bunx playwright test tests/e2e/validate-course.kata.ts --timeout 180000

      - name: Generate Allure report
        if: always()
        run: bunx allure generate allure-results --clean -o allure-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: reports/

  deploy-report:
    if: github.ref == 'refs/heads/master'
    needs: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
