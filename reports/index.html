<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNC Campus Virtual — Reportes</title>
<meta http-equiv="refresh" content="0; url=mvp-demo/index.html">
<style>
  body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f7fa; color: #2b4f6a; }
  .loading { text-align: center; }
  .loading h1 { font-size: 1.5rem; font-weight: 400; }
  .spinner { width: 40px; height: 40px; margin: 20px auto; border: 3px solid #e0e0e0; border-top-color: #2b4f6a; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <h1>Redirigiendo al reporte...</h1>
  <p><a href="mvp-demo/index.html">Click acá si no redirige automáticamente</a></p>
</div>
</body>
